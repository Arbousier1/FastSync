# ============================================================
# FastSync Configuration
# ============================================================

# Unique server identifier (must be unique across all servers in the network)
server-name: "survival-1"

# ------------------------------------------------------------
# Database Settings
# ------------------------------------------------------------
database:
  # Database type: mysql (mariadb is also compatible)
  type: "mysql"

  # Connection settings
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "root"
  password: "password"

  # Table prefix
  table-prefix: "fastsync_"

  # Connection pool (HikariCP) settings
  pool-size: 10
  connection-timeout: 10000
  idle-timeout: 300000
  max-lifetime: 1800000
  leak-detection-threshold: 60000

  # Extra JDBC parameters
  parameters: "useSSL=false&useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&failOverReadOnly=false&maxReconnects=10"

# ------------------------------------------------------------
# Redis Settings (for cross-server lock coordination via pub/sub)
# ------------------------------------------------------------
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  database: 0
  ssl: false
  timeout: 5000
  channel-prefix: "fastsync:lock:"
  cache-enabled: false

  # Redis Streams for critical, recoverable event delivery.
  streams-enabled: true

# ------------------------------------------------------------
# Synchronization Settings
# ------------------------------------------------------------
sync:
  sync-inventory: true
  sync-ender-chest: true
  sync-health: true
  sync-food: true
  sync-experience: true
  sync-potion-effects: true
  sync-game-mode: true
  sync-fire-ticks: true
  sync-air: true
  sync-extra-data: true

  lock-timeout: 30
  lock-retry-interval-ms: 1000
  lock-max-retries: 30

  save-delay: 0
  clear-before-apply: true

  load-fail-kick-message: "&c[FastSync] Failed to load your player data. Please try reconnecting in a few seconds."
  lock-timeout-kick-message: "&c[FastSync] Your data is still being saved by another server. Please try reconnecting in a few seconds."

  # Whether to save player data periodically (in addition to on quit)
  periodic-save: false
  periodic-save-interval-seconds: 300
  # NEW: Number of players saved per tick during periodic save. Spreads the
  # load over multiple ticks instead of submitting every online player to the
  # executor in one tick (which previously caused queue flooding and pool
  # saturation on busy servers). Set to a higher value for smaller servers,
  # lower for larger ones.
  periodic-save-batch-size: 10

  # Sync additional data types (HuskSync feature parity)
  sync-advancements: true
  sync-statistics: true
  sync-attributes: true
  sync-flight: true
  sync-pdc: true
  sync-location: false
  sync-locked-maps: true

  save-on-death: false
  save-on-world-save: true
  cancel-commands-while-locked: false

# ------------------------------------------------------------
# Cluster Settings
# ------------------------------------------------------------
cluster-id: ""

# ------------------------------------------------------------
# Snapshot / Backup Settings
# ------------------------------------------------------------
snapshot:
  enabled: true
  max-snapshots: 16
  backup-frequency-ms: 14400000

  # NEW: Comma-separated list of save causes that should trigger a snapshot.
  # Default: death, disconnect, shutdown, world_save.
  # - "death"        — player died and a death-save was triggered
  # - "disconnect"   — player quit normally
  # - "shutdown"     — server is shutting down
  # - "world_save"   — world save triggered a player save
  # - "periodic"     — periodic auto-save (DEFAULT OFF — was the source of
  #                    ~80% of unnecessary snapshot INSERTs)
  # - "conflict"     — write conflict (always creates a snapshot regardless
  #                    of this list, listed here for completeness)
  # Remove a cause from this list to skip snapshot creation for that path.
  triggers: "death,disconnect,shutdown,world_save"

# ------------------------------------------------------------
# Compression Settings
# ------------------------------------------------------------
compression:
  enabled: true
  type: "LZ4"
  min-size: 128

# ------------------------------------------------------------
# Serialization Settings
# ------------------------------------------------------------
serialization:
  format-version: 1

# ------------------------------------------------------------
# Debug Settings
# ------------------------------------------------------------
debug: false
log-timing: false

# ------------------------------------------------------------
# Conflict Recovery Settings (Dynamo-style Optimistic Concurrency)
# ------------------------------------------------------------
conflict:
  recovery-strategy: "snapshot"
  verify-checksum: true

# ------------------------------------------------------------
# Latency Tracking Settings (Dynamo p99.9 SLA)
# ------------------------------------------------------------
latency:
  enabled: false
  window-size: 1000

# ------------------------------------------------------------
# Operation Log Settings (Raft-inspired per-UUID ordered log)
# ------------------------------------------------------------
operation-log:
  enabled: true
  retention: 100
