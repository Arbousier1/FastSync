# Dependabot: 自动检查并提交依赖更新
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# 每 7 天检查一次：
#   - Gradle 依赖（build.gradle.kts / gradle.properties）
#   - GitHub Actions 版本（.github/workflows/*.yml）
#   - Docker Compose 镜像版本（docker-compose.paper-test.yml）
# 自动创建 PR，CI 通过后人工 merge 即可。

version: 2

updates:
  # Gradle 依赖
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "gradle"
    groups:
      sparrow:
        patterns:
          - "net.momirealms:sparrow-*"
      netty:
        patterns:
          - "io.netty:*"
      junit:
        patterns:
          - "org.junit.jupiter:*"
          - "org.junit:*"
        # JUnit 6 requires Gradle 8.14+ for platform jar alignment.
        # Stay on 5.x until we upgrade Gradle wrapper.
        ignore:
          - dependency-name: "org.junit:junit-bom"
            update-types: ["version-update:semver-major"]
          - dependency-name: "org.junit.jupiter:junit-jupiter"
            update-types: ["version-update:semver-major"]
      testcontainers:
        patterns:
          - "org.testcontainers:*"
        # Sub-modules (mysql, junit-jupiter) don't always have 2.0.x releases
        # when the parent does. Ignore major bumps to avoid broken builds.
        ignore:
          - dependency-name: "org.testcontainers:mysql"
            update-types: ["version-update:semver-major"]
          - dependency-name: "org.testcontainers:junit-jupiter"
            update-types: ["version-update:semver-major"]
      mockito:
        patterns:
          - "org.mockito:*"

  # GitHub Actions 版本
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker Compose 镜像版本
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
      - "docker"
