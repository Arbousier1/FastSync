\* FastSync TLA+ Model Configuration
\* Generated for model checking with TLC
\*
\* This config defines a small finite model with 2 servers and 2 players.
\* The state space is intentionally small to keep model checking tractable
\* while still exercising all the interesting interleavings (join, quit,
\* save, crash, retry, delay).

\* ===================== CONSTANTS =====================
\* Two servers — enough to test cross-server handoff
CONSTANTS
    Servers = {s1, s2}
    Players = {p1, p2}
    NullServer = NIL

\* ===================== INIT / NEXT =====================
\* These are defined in the .tla file
\* INIT Init
\* NEXT Next

\* ===================== INVARIANTS =====================
\* Check all invariants during model checking.
\* If any invariant is violated, TLC will produce a counterexample trace
\* showing the exact sequence of actions that leads to the violation.

INVARIANT
    TypeInvariant
    NoDoubleOwner
    NoLateWrite
    NoDupItem
    NoLostMoney
    MonotonicVersion

\* ===================== STATE CONSTRAINT =====================
\* Limit the model's state space to keep checking tractable.
\* These constraints prevent unbounded growth of counters/tokens.

CONSTRAINT
    \* Keep fencing tokens reasonable
    \A uuid \in Players : leaseToken[uuid] < 5
    \* Keep DB versions reasonable
    \A uuid \in Players : dbVersion[uuid] < 5
    \* Limit ledger size
    Len(ledger) < 10
    \* Limit retry attempts
    \A (s, p) \in (Servers \times Players) : saveAttempts[(s, p)] < 4
    \* Limit inventory/balance to detect duplicates
    \A uuid \in Players : inventoryCount[uuid] < 100
    \A uuid \in Players : balance[uuid] < 100

\* ===================== VIEW =====================
\* (Optional) A view to collapse equivalent states and reduce checking time
\* VIEW View

\* ===================== NOTES =====================
\*
\* To run this model:
\*   1. Install the TLA+ Toolbox from: https://github.com/tlaplus/tlaplus/releases
\*   2. Open FastSync.tla in the TLA+ Toolbox
\*   3. Create a new TLC model with this config
\*   4. Run "Check" — TLC will explore all reachable states
\*
\* Or run from command line:
\*   java -jar tla2tools.jar tlc2.TLC FastSync.tla FastSync.cfg
\*
\* Expected result: all invariants PASS (no violations).
\* If an invariant is violated, the counterexample trace shows exactly
\* which sequence of actions (e.g., "Crash + RetrySave + Save") leads
\* to the bug — this is the value of formal verification.
